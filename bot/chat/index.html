<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Advisor Bot - Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <div class="header-content">
                    <div class="avatar">🚗</div>
                    <div class="header-text">
                        <h1>Asesor de Autos</h1>
                        <p class="status" id="status">En línea</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button type="button" id="reset-btn" class="btn-icon" title="Nueva conversación">
                        <span>🔄</span>
                    </button>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages"></div>

            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>

            <div class="chat-input">
                <div class="input-container">
                    <textarea
                        id="user-input"
                        placeholder="Escribe tu mensaje..."
                        rows="1"
                        maxlength="500"
                    ></textarea>
                    <button id="send-btn" class="btn-send" title="Enviar">
                        <span>➤</span>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="char-count" id="char-count">0/500</span>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-section">
                <h3>⚙️ Configuración</h3>
                <label for="user-id">ID de Usuario:</label>
                <input type="text" id="user-id" placeholder="6185555454" value="6185555454">

                <label for="owner-user-id">Vendedor (catálogo):</label>
                <select id="owner-user-id" title="Owner / tenant para catálogo y CRM"></select>
                <p class="session-item owner-uuid-row">
                    <span class="label">Owner UUID:</span>
                    <span id="owner-display" class="owner-display" title="">—</span>
                </p>

                <label for="api-url">API URL:</label>
                <select id="api-url" title="Entorno del bot">
                    <option value="http://localhost:8000">localhost:8000</option>
                    <option value="https://bot-autobot.vvggha.easypanel.host">Prod bot</option>
                    <option value="">Mismo host (ruta relativa)</option>
                </select>

                <label for="backend-url">Backend URL:</label>
                <select id="backend-url" title="Entorno del backend">
                    <option value="">Auto (igual que API URL)</option>
                    <option value="http://localhost:4000">localhost:4000</option>
                    <option value="https://prueba-autobot.vvggha.easypanel.host">Prod backend</option>
                </select>
            </div>

            <div class="sidebar-section">
                <h3>🧪 Simuladores</h3>
                <p class="owner-hint">
                    Simula un clic CTWA con metadata de anuncio. Usa el vendedor Suzuki para el catálogo correcto.
                </p>
                <button type="button" id="simulate-ad-btn" class="btn-sidebar" title="Simular campaña CTWA Swift Boostergreen">
                    Campaña: Swift Boostergreen 2026
                </button>
            </div>

            <div class="sidebar-section">
                <h3>📊 Estado de Sesión</h3>
                <div id="session-info">
                    <p class="session-item">
                        <span class="label">Nodo actual:</span>
                        <span id="current-node">-</span>
                    </p>
                    <p class="session-item">
                        <span class="label">Auto:</span>
                        <span id="selected-car">-</span>
                    </p>
                    <p class="session-item">
                        <span class="label">financing_plan:</span>
                        <span id="financing-plan">-</span>
                    </p>
                    <p class="session-item">
                        <span class="label">promotion:</span>
                        <span id="promotion">-</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=11"></script>
</body>
</html>
