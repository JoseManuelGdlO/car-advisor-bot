name: CI/CD EasyPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  ci-back:
    name: Back CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install


  ci-bot:
    name: Bot CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate bot source
        run: python -m compileall -q src

  deploy:
    name: Trigger EasyPanel redeploy
    runs-on: ubuntu-latest
    needs:
      - ci-back
      - ci-bot
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy webhook
        env:
          EASYPANEL_DEPLOY_WEBHOOK_URL: ${{ secrets.easypanel_deploy_webhook }}
          EASYPANEL_DEPLOY_TOKEN: ${{ secrets.EASYPANEL_DEPLOY_TOKEN }}
        run: |
          if [ -z "$EASYPANEL_DEPLOY_WEBHOOK_URL" ]; then
            echo "Missing secret: easypanel_deploy_webhook"
            exit 1
          fi

          if [ -n "$EASYPANEL_DEPLOY_TOKEN" ]; then
            curl --fail --silent --show-error \
              -X POST "$EASYPANEL_DEPLOY_WEBHOOK_URL" \
              -H "Authorization: Bearer $EASYPANEL_DEPLOY_TOKEN"
          else
            curl --fail --silent --show-error \
              -X POST "$EASYPANEL_DEPLOY_WEBHOOK_URL"
          fi

          echo "EasyPanel redeploy triggered successfully."
