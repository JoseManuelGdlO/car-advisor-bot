services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: car-advisor-backend
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      API_PREFIX: ${API_PREFIX:-/api}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-}
      BOT_DEFAULT_OWNER_USER_ID: ${BOT_DEFAULT_OWNER_USER_ID:-}
      BOT_DEFAULT_INBOUND_CHANNEL: ${BOT_DEFAULT_INBOUND_CHANNEL:-web}
      BOT_ENGINE_URL: ${BOT_ENGINE_URL:-http://localhost:8000}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
